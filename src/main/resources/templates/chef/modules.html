<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/dashboard}">
<head>
    <title>Modules du Département | ENSA Tétouan</title>
    <style>
        .module-table {
            --bs-table-bg: #f8f9fa;
            border-collapse: separate;
            border-spacing: 0 0.75rem;
        }

        .module-table thead {
            background: linear-gradient(45deg, #0d6efd, #0b5ed7);
            color: white;
            position: sticky;
            top: 0;
        }

        .teacher-badge {
            background-color: #e3f2fd !important;
            color: #0d6efd !important;
            border: 1px solid #0d6efd;
            border-radius: 15px;
            padding: 0.35em 0.8em;
        }

        .table-hover tbody tr:hover {
            background-color: rgba(13, 110, 253, 0.05);
            transform: scale(1.005);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .action-buttons .btn {
            min-width: 100px;
            transition: all 0.2s;
        }

    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-primary mb-0">
                <i class="bi bi-journals me-3"></i>Modules du Département
            </h2>
        </div>

        <div th:if="${successMessage ?: success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successMessage ?: success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${errorMessage ?: error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorMessage ?: error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>


        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <i class="bi bi-table me-2"></i>Liste des Modules
            </div>

            <div class="table-responsive rounded-3">
                <table class="table module-table table-hover mb-0">
                    <thead>
                    <tr>
                        <th style="width: 25%">Module</th>
                        <th style="width: 30%">Description</th>
                        <th style="width: 15%">Charge Horaire</th>
                        <th style="width: 20%">Enseignants</th>
                        <th style="width: 10%" class="text-center">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="module : ${modules}">
                        <td class="fw-semibold text-primary" th:text="${module.name}"></td>
                        <td class="text-muted" th:text="${module.description ?: '-'}"></td>
                        <td>
                            <span class="badge bg-primary rounded-pill fs-6" th:text="${module.workload + 'h'}"></span>
                        </td>
                        <td>
                            <div th:if="${#lists.isEmpty(module.enseignants)}" class="text-muted fst-italic">
                                Non affecté
                            </div>
                            <div th:unless="${#lists.isEmpty(module.enseignants)}" class="d-flex flex-wrap gap-2">
                                    <span th:each="enseignant : ${module.enseignants}"
                                          class="teacher-badge">
                                        <i class="bi bi-person-fill me-1"></i>
                                        <span th:text="${enseignant.firstName + ' ' + enseignant.lastName}"></span>
                                    </span>
                            </div>
                        </td>
                        <td class="text-center action-buttons">
                            <a th:href="@{/chef/modules/assign/{moduleId}(moduleId=${module.id})}"
                               class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-person-plus-fill me-1"></i>Affecter
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
