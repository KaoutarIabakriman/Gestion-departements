<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{dashboard}">
<head>
    <title th:text="${pageTitle ?: 'Enseignants du Département'}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .teacher-table {
            width: 100%;
            border-collapse: collapse;
        }
        .teacher-table th {
            background-color: #f8f9fa;
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid #0d6efd;
        }
        .teacher-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #dee2e6;
        }
        .btn-details {
            background-color: #0d6efd;
            color: white;
        }
    </style>
</head>
<body>

<section layout:fragment="content">
    <div class="container mt-4">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">
                    <i class="fas fa-users me-2"></i>
                    <span th:text="${pageTitle ?: 'Enseignants du Département'}"></span>
                </h5>
            </div>

            <div class="card-body">
                <div th:if="${#lists.isEmpty(enseignants)}" class="alert alert-info">
                    Aucun enseignant trouvé dans ce département.
                </div>

                <div th:if="${!#lists.isEmpty(enseignants)}" class="table-responsive">
                    <table class="table table-hover teacher-table">
                        <thead class="table-light">
                        <tr>
                            <th>Prénom</th>
                            <th>Nom</th>
                            <th>Email</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="enseignant : ${enseignants}">
                            <td th:text="${enseignant.firstName ?: 'N/A'}"></td>
                            <td th:text="${enseignant.lastName ?: 'N/A'}"></td>
                            <td th:text="${enseignant.username}"></td>
                            <td>
                                <button type="button"
                                        class="btn btn-sm btn-details"
                                        data-bs-toggle="modal"
                                        th:attr="data-bs-target='#modal-'+${enseignant.id}">
                                    Détails
                                </button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div th:each="enseignant : ${enseignants}">
        <div class="modal fade" th:id="'modal-'+${enseignant.id}" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header bg-primary text-white">
                        <h5 class="modal-title">Détails de l'enseignant</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="row mb-3">
                            <div class="col-md-4 fw-bold">ID:</div>
                            <div class="col-md-8" th:text="${enseignant.id}"></div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-4 fw-bold">Nom complet:</div>
                            <div class="col-md-8">
                                <span th:text="${enseignant.firstName + ' ' + enseignant.lastName}"></span>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-4 fw-bold">Email:</div>
                            <div class="col-md-8" th:text="${enseignant.username}"></div>
                        </div>
                        <div th:if="${enseignant.phone}" class="row mb-3">
                            <div class="col-md-4 fw-bold">Téléphone:</div>
                            <div class="col-md-8" th:text="${enseignant.phone}"></div>
                        </div>
                        <div th:if="${enseignant.education}" class="row mb-3">
                            <div class="col-md-4 fw-bold">Formation:</div>
                            <div class="col-md-8" th:text="${enseignant.education}"></div>
                        </div>
                        <div th:if="${enseignant.skills}" class="row mb-3">
                            <div class="col-md-4 fw-bold">Compétences:</div>
                            <div class="col-md-8" th:text="${enseignant.skills}"></div>
                        </div>
                        <div th:if="${enseignant.languages}" class="row mb-3">
                            <div class="col-md-4 fw-bold">Langues:</div>
                            <div class="col-md-8" th:text="${enseignant.languages}"></div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fermer</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

</body>
</html>
