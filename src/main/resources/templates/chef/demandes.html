<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/dashboard}">
<head>
    <meta charset="UTF-8">
    <title>Demandes d'Affectation de Modules | ENSA Tétouan</title>
    <style>
        .demandes-container { padding: 0; }
        .demande-card {
            border: 1px solid #e0e0e0;
            margin-bottom: 1.25rem;
            border-radius: .5rem;
            background-color: white;
            box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,0.075);
        }
        .demande-card .enseignant-name { font-weight: 600; }
        .demande-card .module-name {
            color: #0d6efd;
            font-weight: 600;
        }
        .card-header.bg-primary-soft {
            background-color: #f8f9fa;
            color: #212529;
            border-bottom: 1px solid #e0e0e0;
            font-size: 1.1rem;
        }
        .request-actions .btn { margin-left: 0.5rem; }
        .list-group-item {
            border-bottom: 1px solid #f0f0f0;
            padding: 1rem 0;
        }
        .list-group-item:last-child { border-bottom: none; }
        .badge-rejected { background-color: #dc3545 !important; }
        .badge-approved { background-color: #198754 !important; }
        .badge-pending { background-color: #ffc107 !important; }
    </style>
</head>
<body>

<div layout:fragment="content">
    <div class="container mt-4">
        <!-- En-tête -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-primary mb-0">
                <i class="bi bi-ui-checks-grid me-3"></i>Demandes d'Affectation de Modules
            </h2>
            <a th:href="@{/chef/dashboard}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left-circle me-2"></i>Retour au Dashboard
            </a>
        </div>

        <!-- Messages d'alerte -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Contenu principal -->
        <div class="demandes-container">
            <!-- Aucune demande -->
            <div th:if="${demandesParModule == null or demandesParModule.isEmpty()}"
                 class="alert alert-info">
                Aucune demande d'affectation de module en attente.
            </div>

            <!-- Liste des demandes -->
            <div th:unless="${demandesParModule == null or demandesParModule.isEmpty()}">
                <div th:each="entry : ${demandesParModule}" class="demande-card card mb-4">
                    <!-- En-tête de carte (Module) -->
                    <div class="card-header bg-primary-soft py-3">
                        Module: <span class="module-name" th:text="${entry.key.name}"></span>
                        (<span th:text="${entry.key.workload + 'h'}"></span>)
                    </div>

                    <!-- Corps de carte -->
                    <div class="card-body">
                        <h6 class="card-subtitle mb-3 text-muted">Enseignants:</h6>

                        <!-- Liste des enseignants -->
                        <ul class="list-group list-group-flush mb-3">
                            <li th:each="moduleRequest : ${entry.value}"
                                class="list-group-item d-flex justify-content-between align-items-center">
                                <div>
                                    <i class="bi bi-person-lines-fill text-secondary me-2"></i>
                                    <span class="enseignant-name"
                                          th:text="${moduleRequest.enseignant.firstName + ' ' + moduleRequest.enseignant.lastName}">
                                    </span>
                                    <br>
                                    <small class="text-muted ms-4">
                                        Demandé le: <span th:text="${#temporals.format(moduleRequest.requestDate, 'dd/MM/yyyy HH:mm')}"></span>
                                    </small>
                                </div>
                                <div class="request-actions d-flex align-items-center">
                                    <!-- Badge de statut -->
                                    <span th:switch="${moduleRequest.status.name()}" class="badge rounded-pill ms-2">
                                        <span th:case="'PENDING'" class="badge-pending">En Attente</span>
                                        <span th:case="'APPROVED'" class="badge-approved">Approuvé</span>
                                        <span th:case="'REJECTED'" class="badge-rejected">Rejeté</span>
                                    </span>

                                    <!-- Actions -->
                                    <div th:if="${moduleRequest.status.name() == 'PENDING'}" class="d-flex">
                                        <form th:action="@{/chef/demandes/approve/{requestId}(requestId=${moduleRequest.id})}"
                                              method="post" class="me-2">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                            <button type="submit" class="btn btn-sm btn-success">
                                                <i class="bi bi-check-circle me-1"></i>Approuver
                                            </button>
                                        </form>
                                        <form th:action="@{/chef/demandes/reject/{requestId}(requestId=${moduleRequest.id})}"
                                              method="post">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                            <button type="submit" class="btn btn-sm btn-danger">
                                                <i class="bi bi-x-circle me-1"></i>Rejeter
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </li>
                        </ul>

                        <!-- Bouton d'affectation -->
                        <div th:with="hasRejected=${#lists.contains(entry.value.![status], T(com.test.gestiondepartements.Entities.ModuleRequestStatus).REJECTED)}">
                            <a th:href="@{/chef/modules/assign/{moduleId}(moduleId=${entry.key.id})}"
                               class="btn btn-primary btn-sm mt-2"
                               th:if="${not entry.value.empty and not hasRejected}">
                                <i class="bi bi-pencil-square me-1"></i> Procéder à l'affectation
                            </a>
                            <div th:if="${hasRejected}" class="text-muted mt-2">
                                <i class="bi bi-exclamation-circle"></i> L'affectation est désactivée car une demande a été rejetée.
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
