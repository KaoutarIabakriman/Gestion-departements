<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/dashboard}">
<head>
    <meta charset="UTF-8">
    <title>Gestion des Candidatures et Résultats | ENSA Tétouan</title>
    <style>
        .alert-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1050;
            min-width: 350px;
        }

        .container-fluid {
            padding: 1.5rem;  /* Simplified padding */
        }

        .table { /* Styles for the table */
            vertical-align: middle; /* Consistent vertical alignment */
            width: 100%; /* Ensure table takes full width */
        }

        /* Style for table header */
        .table-light th {
            background-color: #f8f9fa; /* Or a color of your choice */
            font-weight: 600; /* Make headers bold */
        }

        .table th, .table td {
            padding: 0.75rem; /* Adjust padding as needed */
            border: 1px solid #dee2e6; /* Add borders to cells */
        }
        /* Style for even rows (striped table) */
        .table-striped tbody tr:nth-of-type(even) {
            background-color: rgba(0,0,0,.05); /* Slightly darker than default */
        }
    </style>
</head>
<body>

<div layout:fragment="content">
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">Gestion des Candidatures et Votes</h2>
            <a th:href="@{/admin/departments}" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-2"></i> Retour aux Départements </a>
        </div>


        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show alert-container" role="alert">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show alert-container" role="alert">
            <i class="fas fa-exclamation-triangle me-2"></i>
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>



        <div class="card">
            <div class="card-header">
                Liste des Candidatures Enregistrées
            </div>
            <div class="card-body">
                <div th:if="${#lists.isEmpty(candidatesInfo)}" class="text-center p-3">
                    Aucune candidature trouvée.
                </div>

                <div th:unless="${#lists.isEmpty(candidatesInfo)}">
                    <table class="table table-striped table-hover">
                        <thead class="table-light">
                        <tr>
                            <th>ID Vote</th>
                            <th>Département</th>
                            <th>Candidat (Nom)</th>
                            <th>Candidat (Email)</th>
                            <th>Date de Candidature</th>
                            <th class="text-center">Votes Reçus</th>
                            <th class="text-center">Voters</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="candidateInfo : ${candidatesInfo}">
                            <td th:text="${candidateInfo.voteId ?: 'N/A'}"></td>
                            <td th:text="${candidateInfo.departmentName}"></td>
                            <td th:text="${candidateInfo.candidateFullName}"></td>
                            <td th:text="${candidateInfo.candidateUsername}"></td>
                            <td th:text="${candidateInfo.declaredAt != null ? #temporals.format(candidateInfo.declaredAt, 'dd/MM/yyyy HH:mm') : 'N/A'}"></td>
                            <td class="text-center" th:text="${candidateInfo.voteCount}"></td>
                            <td class="text-center">
                                <span th:each="voter : ${candidateInfo.voters}" th:text="${voter + ', '}"></span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script layout:fragment="script">
    document.addEventListener('DOMContentLoaded', function() {

        // Auto-dismiss alerts after a delay (if needed):
        const alertElements = document.querySelectorAll('.alert');
        alertElements.forEach(alert => {
            setTimeout(() => {
                bootstrap.Alert.getOrCreateInstance(alert).close();
            }, 5000); // Dismiss after 5 seconds
        });
    });

</script>

</body>
</html>
