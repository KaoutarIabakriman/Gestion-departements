<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/dashboard}">
<head>
    <meta charset="UTF-8">
    <title>Gestion des Modules | ENSA Tétouan</title>
</head>
<body>

<div layout:fragment="content">
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Gestion des Modules</h2>
            <a th:href="@{/admin/modules/add}" class="btn btn-primary">
                <i class="fas fa-plus me-2"></i> Ajouter Module
            </a>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>


        <table class="table table-striped table-hover">
            <thead class="table-light">
            <tr>
                <th>Nom</th>
                <th>Description</th>
                <th>Département</th>
                <th>Charge Horaire</th> <!-- Nouvelle colonne -->
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="module : ${modules}">
                <td th:text="${module.name}"></td>
                <td th:text="${module.description}"></td>
                <td th:text="${module.department.name}"></td>
                <td th:text="${module.workload} + ' heures'"></td> <!-- Afficher la charge horaire -->
                <td>
                    <a th:href="@{/admin/modules/edit/{id}(id=${module.id})}" class="btn btn-sm btn-info">
                        <i class="fas fa-edit"></i> Modifier
                    </a>
                    <!-- Ajoutez ici un bouton/lien pour supprimer si nécessaire -->
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
