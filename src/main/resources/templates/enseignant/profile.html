<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications | ENSA Tétouan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
    <div class="container py-4 fade-in">
        <div class="profile-container">
            <div class="card shadow-lg">
                <div class="profile-header text-center p-4">
                    <img th:src="${profileDTO.firstName != null && profileDTO.lastName != null} ? 
                         'https://ui-avatars.com/api/?name=' + ${profileDTO.firstName} + '+' + ${profileDTO.lastName} + '&background=random&color=fff' : 
                         'https://ui-avatars.com/api/?name=U+S+E+R&background=random&color=fff'"
                         class="profile-avatar mb-3"
                         alt="Photo de profil">
                    <h3 class="profile-name" th:text="${profileDTO.firstName + ' ' + profileDTO.lastName} ?: 'Nom Prénom'"></h3>
                    <p class="profile-role text-muted">Enseignant</p>
                </div>
                
                <div class="card-body p-4">
                    <form th:action="@{/enseignant/profile}" th:object="${profileDTO}" method="post">
                        <input type="hidden" th:field="*{id}"/>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-4">
                                    <h5 class="section-title">Informations Personnelles</h5>

                                    <div class="mb-3">
                                        <label class="form-label">Prénom</label>
                                        <input type="text" class="form-control" th:field="*{firstName}"
                                               th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'">
                                        <div th:if="${#fields.hasErrors('firstName')}" class="error-message" th:errors="*{firstName}"></div>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">Nom</label>
                                        <input type="text" class="form-control" th:field="*{lastName}"
                                               th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'">
                                        <div th:if="${#fields.hasErrors('lastName')}" class="error-message" th:errors="*{lastName}"></div>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">Téléphone</label>
                                        <input type="tel" class="form-control" th:field="*{phone}">
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="mb-4">
                                    <h5 class="section-title">Informations Professionnelles</h5>

                                    <div class="mb-3">
                                        <label class="form-label">Formation</label>
                                        <textarea class="form-control" th:field="*{education}" rows="3"></textarea>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">Compétences</label>
                                        <textarea class="form-control" th:field="*{skills}" rows="3"
                                                  placeholder="Séparées par des virgules (ex: Java, Python, IA)"></textarea>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">Langues</label>
                                        <textarea class="form-control" th:field="*{languages}" rows="3"
                                                  placeholder="Séparées par des virgules (ex: Français, Anglais, Arabe)"></textarea>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end mt-4">
                            <button type="submit" class="btn btn-save">
                                <i class="fas fa-save me-2"></i> Enregistrer
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const mobileMenuBtn = document.getElementById('mobileMenuBtn');
            const sidebar = document.getElementById('sidebar');

            if (mobileMenuBtn && sidebar) {
                mobileMenuBtn.addEventListener('click', function() {
                    sidebar.classList.toggle('active');
                });
            }

            document.addEventListener('click', function(event) {
                if (window.innerWidth <= 992) {
                    const isClickInsideSidebar = sidebar.contains(event.target);
                    const isClickOnMenuBtn = (event.target === mobileMenuBtn || mobileMenuBtn.contains(event.target));

                    if (!isClickInsideSidebar && !isClickOnMenuBtn && sidebar.classList.contains('active')) {
                        sidebar.classList.remove('active');
                    }
                }
            });

            setTimeout(() => {
                const alerts = document.querySelectorAll('.alert');
                alerts.forEach(alert => {
                    const bsAlert = new bootstrap.Alert(alert);
                    bsAlert.close();
                });
            }, 5000);
        });
    </script>
</body>
</html>
