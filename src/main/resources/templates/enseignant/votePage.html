<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/dashboard}">
<head>
    <meta charset="UTF-8">
    <title th:text="'Vote pour Chef de Département - ' + ${vote.department.name}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .vote-container {
            max-width: 700px;
            margin: 2rem auto;
            padding: 2rem;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.1);
        }
        .candidate-card {
            padding: 1rem;
            border: 1px solid #eee;
            border-radius: 5px;
            margin-bottom: 0.75rem;
            cursor: pointer;
            transition: background-color 0.2s ease-in-out;
        }
        .candidate-card:hover, .candidate-card.selected {
            background-color: #e9ecef;
        }
        .candidate-card input[type="radio"] {
            margin-right: 10px;
        }
        .btn-submit-vote {
            background-color: #1a5276;
            border-color: #1a5276;
            color: white;
        }
        .alert-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1050;
            min-width: 300px;
        }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="alert-container">
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-triangle me-2"></i>
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${warningMessage}" class="alert alert-warning alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span th:text="${warningMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
    </div>

    <div class="vote-container">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 th:text="'Vote: Chef du Département ' + ${vote.department.name}"></h2>
            <a th:href="@{/enseignant/notifications}" class="btn btn-sm btn-outline-secondary">
                <i class="fas fa-arrow-left"></i> Retour Notifications
            </a>
        </div>
        <hr>


        <div th:if="${vote.status.name() == 'ACTIVE' and !hasVoted}">

            <div th:if="${#lists.isEmpty(candidates)}" class="alert alert-warning">
                Aucun candidat éligible n'est disponible pour ce vote.
            </div>

            <form th:unless="${#lists.isEmpty(candidates)}" th:action="@{/vote/submit}" method="post">
                <input type="hidden" name="voteId" th:value="${vote.id}"/>

                <p class="mb-3">Veuillez sélectionner un candidat pour le poste de Chef de Département.</p>

                <div th:each="candidate : ${candidates}" class="candidate-card" th:id="'candidate-card-' + ${candidate.id}">
                    <label th:for="'candidate-' + ${candidate.id}" class="form-check-label d-block w-100">
                        <input type="radio" name="candidateId" th:id="'candidate-' + ${candidate.id}" th:value="${candidate.user.id}" class="form-check-input" required/>
                        <strong th:text="${candidate.user.firstName + ' ' + candidate.user.lastName}"></strong>
                        <small class="text-muted d-block" th:text="${candidate.user.username}"></small>
                    </label>
                </div>

                <div class="mt-4 text-end">
                    <button type="submit" class="btn btn-submit-vote btn-lg">
                        <i class="fas fa-vote-yea"></i> Soumettre mon Vote
                    </button>
                </div>
            </form>
        </div>


        <div th:if="${vote.status.name() == 'ACTIVE' and !hasVoted}">
            <form th:if="${!isCandidate}" th:action="@{/vote/declareCandidacy/{voteId}(voteId=${vote.id})}" method="post">
                <button type="submit" class="btn btn-primary">Declare Candidacy</button>
            </form>
            <div th:if="${isCandidate}" class="alert alert-info">You are a candidate in this vote.</div>
        </div>

        <div th:if="${vote.status.name() != 'ACTIVE'}">
            <p class="alert alert-info">Ce vote n'est plus actif.</p>
        </div>

        <div th:if="${hasVoted}">
            <p class="alert alert-info"><i class="fas fa-check-circle"></i> Vous avez déjà participé à ce vote.</p>
        </div>


    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script layout:fragment="script">
    document.addEventListener('DOMContentLoaded', function() {
        const candidateCards = document.querySelectorAll('.candidate-card');
        candidateCards.forEach(card => {
            card.addEventListener('click', function() {
                candidateCards.forEach(c => c.classList.remove('selected'));
                this.classList.add('selected');
                const radio = this.querySelector('input[type="radio"]');
                if (radio) {
                    radio.checked = true;
                }
            });
        });

        const alertElements = document.querySelectorAll('.alert-container .alert');
        alertElements.forEach(function(alert) {
            setTimeout(function() {
                const bsAlert = bootstrap.Alert.getOrCreateInstance(alert);
                if (bsAlert) {
                    bsAlert.close();
                }
            }, 7000);
        });
    });
</script>
</body>
</html>
